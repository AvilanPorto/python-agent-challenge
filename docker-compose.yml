services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - KB_URL=${KB_URL}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - MEMORY_STORE=${MEMORY_STORE}
      - HOST=${HOST}
      - PORT=${PORT}
    restart: unless-stopped